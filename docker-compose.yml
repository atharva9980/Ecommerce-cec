version: '3.8'

services:

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "50051:50051"

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "50052:50052"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3003:3003"
    depends_on:
      - user-service
      - product-service

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - order-service